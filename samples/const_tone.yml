version: 1
nodes:
  - id: freq
    type: const_generator
    params: { value: 440.0 }
  - id: amp
    type: const_generator
    params: { value: 0.5 }
  - id: osc1
    type: sine_oscillator
  - id: out1
    type: audio_output
    params: { device: default, channels: 2 }
wires:
  - { from: [freq, out], to: [osc1, frequency] }
  - { from: [amp,  out], to: [osc1, amplitude] }
  - { from: [osc1, out], to: [out1, ch0] }
  - { from: [osc1, out], to: [out1, ch1] }
layout:
  freq: [-160, -40]
  amp:  [-160, 40]
  osc1: [0, 0]
  out1: [160, 0]
